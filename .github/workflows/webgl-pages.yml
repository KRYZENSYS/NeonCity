name: Deploy WebGL to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: unityci/editor:ubuntu-6000.0.23f1-webgl-3.1.0
      options: --privileged
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          submodules: recursive

      - name: Create placeholder scenes & build script
        run: |
          mkdir -p Assets/Scenes Assets/Scripts/Editor
          cat > Assets/Scenes/Bootstrap.unity << 'EOF'
          %YAML 1.1
          %TAG !u! tag:unity3d.com,2011:
          --- !u!29 &1
          OcclusionCullingSettings:
            m_ObjectHideFlags: 0
          EOF
          cp Assets/Scenes/Bootstrap.unity Assets/Scenes/MainMenu.unity
          cp Assets/Scenes/Bootstrap.unity Assets/Scenes/City.unity

          cat > Assets/Scripts/Editor/BuildScript.cs << 'EOF'
          #if UNITY_EDITOR
          using UnityEditor;
          using UnityEditor.Build.Reporting;
          using UnityEngine;
          using System.IO;
          public static class BuildScript {
            public static void WebGL() {
              Directory.CreateDirectory("build/WebGL");
              var opts = new BuildPlayerOptions {
                scenes           = new[] { "Assets/Scenes/Bootstrap.unity", "Assets/Scenes/MainMenu.unity", "Assets/Scenes/City.unity" },
                locationPathName = "build/WebGL",
                target           = BuildTarget.WebGL,
                options          = BuildOptions.None
              };
              var report = BuildPipeline.BuildPlayer(opts);
              Debug.Log($"[BuildScript] WebGL -> {report.summary.result}");
              if (report.summary.result != BuildResult.Succeeded)
                throw new System.Exception("WebGL build failed");
            }
          }
          #endif
          EOF

      - name: Build WebGL
        run: |
          /opt/unity/Editor/Unity \
            -batchmode -quit -nographics -accept-apiupdate \
            -projectPath /project \
            -buildTarget WebGL \
            -executeMethod BuildScript.WebGL \
            -logFile /tmp/unity-webgl.log

      - name: Show log on failure
        if: failure()
        run: |
          echo "=========== Unity log ==========="
          tail -200 /tmp/unity-webgl.log || true

      - name: Verify WebGL output
        run: |
          test -f build/WebGL/index.html || (echo "index.html missing" && exit 1)
          echo "WebGL OK: $(du -sh build/WebGL | cut -f1)"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/WebGL

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4