name: Deploy NeonCity

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ============================================================
  # 1) Build Unity WebGL  → Netlify
  # ============================================================
  build-webgl:
    name: Build WebGL
    runs-on: ubuntu-latest
    container:
      image: unityci/editor:ubuntu-6000.0.23f1-webgl-3.1.0
    steps:
      - uses: actions/checkout@v4
        with: { lfs: true }

      - name: Create BuildSettings stub
        run: |
          mkdir -p Assets/Scripts/Editor
          cat > Assets/Scripts/Editor/BuildScript.cs << 'EOF'
          #if UNITY_EDITOR
          using UnityEditor;
          using UnityEditor.Build.Reporting;
          using UnityEngine;
          using System.IO;
          public static class BuildScript {
            public static void WebGL() {
              Directory.CreateDirectory("build/WebGL");
              var opts = new BuildPlayerOptions {
                scenes = new[] {
                  "Assets/Scenes/Bootstrap.unity",
                  "Assets/Scenes/MainMenu.unity",
                  "Assets/Scenes/City.unity",
                },
                locationPathName = "build/WebGL",
                target = BuildTarget.WebGL,
                options = BuildOptions.None
              };
              BuildPipeline.BuildPlayer(opts);
            }
          }
          #endif
          EOF

      - name: Build
        run: |
          /opt/unity/Editor/Unity \
            -batchmode -quit -nographics \
            -projectPath . \
            -buildTarget WebGL \
            -executeMethod BuildScript.WebGL \
            -logFile -

      - name: Zip WebGL output
        run: |
          cd build/WebGL
          zip -r ../../webgl-build.zip . -x "*.map"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: neoncity-webgl
          path: webgl-build.zip

      # ========================================================
      # Auto-deploy to Netlify (requires NETLIFY_AUTH_TOKEN)
      # ========================================================
      - name: Deploy to Netlify
        if: success()
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          npm install -g netlify-cli
          cd build/WebGL
          netlify deploy --dir=. --prod --auth=$NETLIFY_AUTH_TOKEN --site=$NETLIFY_SITE_ID
        continue-on-error: true

  # ============================================================
  # 2) Build Android APK → Upload as artifact
  # ============================================================
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    container:
      image: unityci/editor:ubuntu-6000.0.23f1-android-3.1.0
    steps:
      - uses: actions/checkout@v4
        with: { lfs: true }

      - name: Create keystore (one-time)
        run: |
          mkdir -p /tmp/keystore
          if [ ! -f /tmp/keystore/neoncity.keystore ]; then
            keytool -genkey -v \
              -keystore /tmp/keystore/neoncity.keystore \
              -alias neoncity \
              -keyalg RSA -keysize 2048 \
              -validity 10000 \
              -storepass neoncity123 \
              -keypass neoncity123 \
              -dname "CN=NeonCity, OU=Game, O=KRYZENSYS, L=Tashkent, S=UZ, C=UZ"
          fi

      - name: Build APK
        env:
          KEYSTORE_PATH: /tmp/keystore/neoncity.keystore
          KEYSTORE_PASS: neoncity123
          KEYALIAS: neoncity
        run: |
          mkdir -p build/Android
          /opt/unity/Editor/Unity \
            -batchmode -quit -nographics \
            -projectPath . \
            -buildTarget Android \
            -executeMethod BuildScript.Android \
            -keystore $KEYSTORE_PATH \
            -keystorepass $KEYSTORE_PASS \
            -keyaliasName $KEYALIAS \
            -keyaliasPass $KEYSTORE_PASS \
            -logFile -

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: neoncity-android
          path: build/Android/*.apk
        continue-on-error: true

  # ============================================================
  # 3) Build Linux64 server build
  # ============================================================
  build-linux:
    name: Build Linux64
    runs-on: ubuntu-latest
    container:
      image: unityci/editor:ubuntu-6000.0.23f1-base-3.1.0
    steps:
      - uses: actions/checkout@v4
        with: { lfs: true }

      - name: Build
        run: |
          mkdir -p build/Linux
          /opt/unity/Editor/Unity \
            -batchmode -quit -nographics \
            -projectPath . \
            -buildTarget Linux64 \
            -executeMethod BuildScript.Linux64 \
            -logFile -

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: neoncity-linux
          path: build/Linux/NeonCity*
        continue-on-error: true

  # ============================================================
  # 4) Test Node.js server (sanity check before Render deploy)
  # ============================================================
  test-server:
    name: Test Server
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: ./Server } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Server/package-lock.json
      - run: npm ci
      - name: Start server in background
        run: |
          node server.js &
          SERVER_PID=$!
          sleep 3
          curl -s http://localhost:4000/health | tee /tmp/health.json
          kill $SERVER_PID || true
      - name: Verify health endpoint
        run: |
          grep -q '"ok":true' /tmp/health.json && echo "OK" || (echo "FAIL" && exit 1)