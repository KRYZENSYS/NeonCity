# =============================================================================
# NeonCity — Local development stack
# =============================================================================
# Run: docker compose up
# - Node.js authoritative server  → http://localhost:4000
# - Game server (Unity headless)  → UDP 7777
# =============================================================================

version: "3.9"

services:
  # ---- Authoritative Node.js server ----
  game-api:
    build:
      context: ./Server
      dockerfile: Dockerfile
    container_name: neoncity-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ---- Unity dedicated game server (headless Linux) ----
  game-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neoncity-game
    restart: unless-stopped
    depends_on:
      - game-api
    ports:
      - "7777:7777/udp"
      - "7777:7777/tcp"
    environment:
      - UNITY_SERVER_MODE=1
      - SERVER_IP=game-api
      - SERVER_PORT=4000

  # ---- Optional: MongoDB for persistent state (replace Firebase) ----
  mongo:
    image: mongo:7
    container_name: neoncity-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    profiles: ["with-mongo"]

volumes:
  mongo_data: