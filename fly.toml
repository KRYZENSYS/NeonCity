# Fly.io config — alternative hosting to Render (lower ping in Asia)
# Run: flyctl launch --copy-config

app = "neoncity-server"
primary_region = "sin"  # Singapore — best for Central Asia / Middle East

[build]
  dockerfile = "Server/Dockerfile"

[env]
  NODE_VERSION = "20"
  PORT = "4000"

[[services]]
  internal_port = 4000
  protocol      = "tcp"
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[services.ports]]
    handlers = ["http"]
    port = 80
    force_https = true

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.tcp_checks]]
    interval = "15s"
    timeout  = "2s"
    grace_period = "10s"

[deploy]
  strategy = "rolling"